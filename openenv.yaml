name: cyber-battle-env
version: "1.0.0"
description: >
  TRUE multi-agent AI vs AI cybersecurity simulation.
  LLM Attacker vs LLM Defender across 3 difficulty levels.
  Network: User -> Web Server -> App Server -> Database.

author: raun
tags:
  - cybersecurity
  - multi-agent
  - rl
  - openenv

tasks:
  - name: easy
    description: >
      TRUE AI vs AI (Easy): LLM Attacker vs Passive LLM Defender.
      Attacker goal: compromise the Web Server (node 1).
      Defender role: junior analyst — patch and monitor only, no isolation.
      Attacker wins with a basic 2-step strategy (scan + exploit).
    max_steps: 15
    reward_range: [0.0, 1.0]

  - name: medium
    description: >
      TRUE AI vs AI (Medium): LLM Attacker vs Moderate LLM Defender.
      Attacker goal: exfiltrate data from the Database (node 3) stealthily.
      Defender role: security engineer — patches nodes and monitors actively.
      Max 2 detections allowed. Attacker must plan a multi-hop stealthy route.
    max_steps: 20
    reward_range: [0.0, 1.0]

  - name: hard
    description: >
      TRUE AI vs AI (Hard): LLM Attacker vs Aggressive LLM Defender.
      Both sides use an LLM to reason and adapt each turn.
      Defender has full arsenal: patch, monitor, isolate, restore, block.
      Attacker must exfiltrate the Database before being detected 3 times.
      The most challenging task — both agents genuinely learn from each other.
    max_steps: 25
    reward_range: [0.0, 1.0]

action_space:
  type: discrete
  actions:
    - scan          # Reconnaissance — stealth factor 0.8
    - exploit       # Compromise adjacent node — stealth factor 0.4
    - lateral_move  # Traverse compromised node — stealth factor 0.6
    - escalate      # Privilege escalation — stealth factor 0.5
    - exfiltrate    # Data exfiltration from Database — stealth factor 0.15
  parameters:
    - target_node: int  # Node ID: 0=User, 1=WebServer, 2=AppServer, 3=Database

observation_space:
  nodes:
    - node_id: int
    - name: str
    - vulnerability_level: float  # 0.0–1.0
    - is_compromised: bool
    - detection_risk: float       # 0.0–1.0
    - patch_level: float          # 0.0–1.0
    - is_isolated: bool
    - is_monitored: bool
  attacker_position: int
  attacker_detected: bool
  detection_count: int
  compromised_nodes: list[int]
  available_attacker_actions: list[str]

reward:
  shaping: true
  partial_progress: true
  signals:
    - scan_success:        +0.05
    - exploit_success:     +0.20 to +0.35
    - lateral_move:        +0.05 to +0.15
    - escalate_success:    +0.07
    - exfiltration:        +0.70
    - task_win_bonus:      +0.50 (task 1 only)
    - detection_penalty:   -0.05 to -0.30
    - timeout_penalty:     -0.10

endpoint:
  server: uvicorn cyber_battle_env.server.app:app
  port: 8000
  health: /health
  reset: POST /reset
  step: POST /step              # Attacker action
  defender_step: POST /defender_step  # Defender action (AI vs AI)
  state: GET /state
  docs: GET /docs
